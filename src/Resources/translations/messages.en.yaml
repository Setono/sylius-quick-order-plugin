setono_sylius_quick_order:
    ui:
        paste: Paste
        paste_placeholder: |
            Here you can paste SKUs (and optionally quantities) directly from a document (e.g. Excel or Google Spreadsheets).
            Rows are separated by a newline and SKUs and quantities are separated by a space, comma, tab or semicolon. Here are a few examples:
            
            Only SKUs:
            
            SKU1
            SKU2
            SKU3
            
            SKUs and quantities in the same row:
            
            SKU1,12
            SKU2
            SKU3,3
        quick_order: Quick order
        quick_order_introduction: Add multiple products by pasting SKUs and selecting quantities. If any product is unavailable, none will be added to your cart.
        remove: Remove
